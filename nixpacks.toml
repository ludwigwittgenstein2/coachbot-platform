[phases.setup]
nixPkgs = ["python312", "postgresql"]

[phases.install]
cmds = ["python -m venv /opt/venv && . /opt/venv/bin/activate && pip install -r requirements.txt"]

[phases.build]
cmds = ["python manage.py collectstatic --noinput"]

[start]
cmd = "python manage.py migrate --noinput && python manage.py seed_bots && gunicorn coachbot_project.wsgi:application --bind 0.0.0.0:$PORT"
